<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Types of CSS</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
            text-align: center;
        }

        .internal-style {
            color: green;
            font-size: 18px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="csstypes.css">
</head>

<body>

    <h1 style="color: red; text-align: center;">
        Inline CSS Example
    </h1>

    <h2>Internal CSS Example</h2>
    <p class="internal-style">
        This paragraph is styled using internal CSS.
    </p>

    <h2>External CSS Example</h2>
    <p class="external-style">
        This paragraph will be styled using external CSS.
    </p>

</body>
</html>
