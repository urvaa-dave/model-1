<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Semantic Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        section {
            padding: 20px;
        }
        article {
            background-color: #f4f4f4;
            padding: 15px;
            margin-bottom: 10px;
        }
        aside {
            background-color: #ddd;
            padding: 10px;
            margin: 20px;
        }
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Learning Semantic HTML</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <article>
        <h2>First Article</h2>
        <p>This is the first article on the webpage.</p>
    </article>

    <article>
        <h2>Second Article</h2>
        <p>This is another article with useful content.</p>
    </article>
</section>

<aside>
    <h3>Sidebar</h3>
    <p>Additional information or links go here.</p>
</aside>

<footer>
    <p>© 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
