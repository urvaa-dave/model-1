<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Encoding Example</title>
</head>
<body>

    <h2>URL Encoding Demo</h2>

    <!-- Normal URL -->
    <p>Normal URL:</p>
    <a href="https://example.com/search?name=John Doe">
        Click here (may not work properly)
    </a>

    <br><br>

    <!-- URL Encoded -->
    <p>Encoded URL:</p>
    <a href="https://example.com/search?name=John%20Doe">
        Click here (encoded URL)
    </a>

</body>
</html>
